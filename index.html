<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Event Dashboard</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
  padding:20px;
}

h1{text-align:center;}

/* TIMER */
#timer{
  text-align:center;
  font-size:120px;
  font-weight:bold;
  margin:20px 0;
  text-shadow:0 0 15px #22c55e,0 0 40px #22c55e;
}

/* LAYOUT */
.container{
  display:flex;
  gap:20px;
}

.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(12px);
  padding:20px;
  border-radius:16px;
}

.left{width:55%;}
.right{width:45%;}

/* INPUT */
textarea{
  width:100%;
  height:140px;
  border-radius:10px;
  padding:12px;
  border:none;
  outline:none;
  font-size:15px;
}

input{
  width:70%;
  padding:8px;
  border-radius:8px;
  border:none;
}

/* BUTTON */
button{
  padding:10px 16px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  color:white;
  margin:5px;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  transition:0.2s;
}

button:hover{
  transform:scale(1.05);
}

/* RESULT */
.correct{color:#22c55e;}
.wrong{color:#ef4444;}

#score{
  font-size:22px;
  margin-top:10px;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
}

td,th{
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

/* MOBILE */
@media(max-width:768px){
  .container{flex-direction:column;}
  .left,.right{width:100%;}
  #timer{font-size:60px;}
}
</style>
</head>

<body>

<h1>⚡ Event Dashboard</h1>

<div style="text-align:center;">
  <button id="startBtn" onclick="startTimer()">Start Event</button>
  <button onclick="resetAll()">Reset</button>
</div>

<div id="timer">0m 0s</div>

<div class="container">

<!-- LEFT -->
<div class="left card">

<h2>🧩 Answer / Score Input</h2>

<input id="teamName" placeholder="Enter Team Name">
<br><br>

<textarea id="bulkInput" placeholder="Paste answers OR enter score (e.g. 10)"></textarea>

<br>

<button onclick="processInput()">Check</button>
<button onclick="submitScore()">Submit</button>

<div id="score"></div>
<div id="result"></div>

</div>

<!-- RIGHT -->
<div class="right card">
<h2>🏆 Leaderboard</h2>
<div id="board"></div>
</div>

</div>

<script>
// TIMER
let startTime=0, timerStarted=false;

function formatTime(sec){
  return Math.floor(sec/60)+"m "+(sec%60)+"s";
}

function startTimer(){
  if(timerStarted) return;
  timerStarted=true;
  startTime=Date.now();
  document.getElementById("startBtn").disabled=true;

  setInterval(()=>{
    let t=Math.floor((Date.now()-startTime)/1000);
    document.getElementById("timer").innerText=formatTime(t);
  },1000);
}

// ANSWERS
const answers=[
"ALGORITHM","WEB BROWSER","BACKUP",
"FOOD DELIVERY APPS","VIDEO SHARING PLATFORMS","CLOUD COMPUTING",
"OTT PLATFORMS","PIXEL","MESSAGING APPS","STACK",
"SOCIAL MEDIA","RIDE SHARING","EMAIL SERVICES","URL","PASSWORD"
];

// CLEAN
function cleanText(t){
  return t.toUpperCase().replace(/[^A-Z]/g,"");
}

let lastScore=0;

// MAIN LOGIC
function processInput(){
  let input=document.getElementById("bulkInput").value.trim();

  // 🔢 If number only
  if(/^\d+$/.test(input)){
    lastScore=parseInt(input);
    showScore(lastScore,"Manual score used ✅");
    return;
  }

  // 🧠 Extract words (ignore numbers/symbols)
  let words=input.split(/\n|,|\./)
    .map(x=>cleanText(x))
    .filter(x=>x!="");

  let score=0, html="";

  answers.forEach(ans=>{
    let c=cleanText(ans);

    if(words.includes(c)){
      html+=`<div class="correct">✅ ${ans}</div>`;
      score++;
    }else{
      html+=`<div class="wrong">❌ ${ans}</div>`;
    }
  });

  lastScore=score;
  showScore(score,html);
}

function showScore(score,html){
  document.getElementById("score").innerText=
    "🎯 Score: "+score+" / "+answers.length;

  document.getElementById("result").innerHTML=
    typeof html==="string" && html.includes("div") ? html :
    `<div class="correct">${html}</div>`;
}

// LEADERBOARD
let data=JSON.parse(localStorage.getItem("board"))||[];

function submitScore(){
  let name=document.getElementById("teamName").value;
  if(!name){alert("Enter team name");return;}

  let time=Math.floor((Date.now()-startTime)/1000);

  data.push({name,score:lastScore,time});
  localStorage.setItem("board",JSON.stringify(data));
  loadBoard();
}

function loadBoard(){
  let html="<table><tr><th>Rank</th><th>Team</th><th>Score</th><th>Time</th></tr>";

  data.sort((a,b)=> b.score!==a.score ? b.score-a.score : a.time-b.time);

  data.forEach((r,i)=>{
    let rank=i<3?["🥇","🥈","🥉"][i]:i+1;
    html+=`<tr>
      <td>${rank}</td>
      <td>${r.name}</td>
      <td>${r.score}</td>
      <td>${formatTime(r.time)}</td>
    </tr>`;
  });

  html+="</table>";
  document.getElementById("board").innerHTML=html;
}

// RESET
function resetAll(){
  localStorage.removeItem("board");
  location.reload();
}

window.onload=loadBoard;
</script>

</body>
</html>

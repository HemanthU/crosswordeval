<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Event Dashboard</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
  padding:20px;
}

h1{text-align:center;}

/* 🔥 BIG TIMER */
#timer{
  text-align:center;
  font-size:150px;
  font-weight:bold;
  margin:20px 0;
  text-shadow:0 0 20px #22c55e, 0 0 50px #22c55e;
  letter-spacing:3px;
}

.container{display:flex;gap:20px;}

.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  padding:20px;
  border-radius:16px;
}

/* SCROLL PANEL */
.left{
  width:55%;
  max-height:500px;
  overflow-y:auto;
}

.right{width:45%;}

table{width:100%;border-collapse:collapse;}
td,th{padding:10px;border-bottom:1px solid rgba(255,255,255,0.1);}

/* TEXTAREA */
textarea{
  width:120px;
  height:60px;
  padding:6px;
  border-radius:6px;
  border:none;
  text-align:center;
  resize:none;
  font-size:12px;
}

/* SEARCH */
.search{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:none;
  margin-bottom:10px;
}

/* GREEN BUTTONS */
button{
  padding:8px 14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  color:white;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  transition:0.2s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 10px #22c55e;
}

tr:hover{
  background:rgba(255,255,255,0.08);
}

/* MOBILE */
@media(max-width:768px){
  .container{flex-direction:column;}
  .left,.right{width:100%;}
  #timer{font-size:70px;}
}
</style>
</head>

<body>

<h1>⚡ Event Dashboard</h1>

<div style="text-align:center;">
  <button onclick="startTimer()">Start Event</button>
  <button onclick="resetAll()">Reset</button>
</div>

<h2 id="timer">0m 0s</h2>

<div class="container">

<div class="left card">
  <h2>🎯 Team Panel</h2>

  <input id="searchBox2" class="search" placeholder="Search team..." onkeyup="filterPanel()">

  <table id="panel">
    <tr>
      <th>Team</th>
      <th>Score</th>
      <th>Action</th>
      <th>Time</th>
    </tr>
  </table>

  <button onclick="updateScores()">Update Scores</button>
</div>

<div class="right card">
  <h2>🏆 Leaderboard</h2>
  <div id="board"></div>
</div>

</div>

<script>

// 🔥 50 TEAMS
const teams = [];
for(let i=1;i<=50;i++){
  teams.push("Team " + i);
}

let startTime = 0;
let timerStarted = false;

// ANSWERS
const answers = [
  "ALGORITHM","WEB BROWSER","BACKUP",
  "PIXEL","STACK","URL","PASSWORD"
];

// CLEAN TEXT
function cleanText(t){
  return t.toUpperCase().replace(/[^A-Z]/g,"");
}

// TIMER
function formatTime(sec){
  return Math.floor(sec/60)+"m "+(sec%60)+"s";
}

function startTimer(){
  if(timerStarted) return;

  timerStarted = true;
  startTime = Date.now();

  setInterval(function(){
    let t = Math.floor((Date.now()-startTime)/1000);
    document.getElementById("timer").innerText = formatTime(t);
  },1000);
}

// LOAD PANEL
function loadPanel(){
  let table = document.getElementById("panel");

  for(let i=0;i<teams.length;i++){
    let row = table.insertRow(-1);

    row.innerHTML =
      "<td>"+teams[i]+"</td>"+
      "<td><textarea id='score"+i+"' placeholder='Score / Paste'></textarea></td>"+
      "<td><button id='btn"+i+"' onclick='finishTeam("+i+")'>Finish</button></td>"+
      "<td id='time"+i+"'>-</td>";
  }
}

// FINISH TEAM
function finishTeam(i){
  let time = Math.floor((Date.now()-startTime)/1000);

  document.getElementById("time"+i).innerText = formatTime(time);
  document.getElementById("btn"+i).disabled = true;

  let data = JSON.parse(localStorage.getItem("scores")) || [];

  data.push({team:teams[i], time:time, score:null});

  localStorage.setItem("scores", JSON.stringify(data));
  loadBoard();
}

// UPDATE SCORES (FIXED)
function updateScores(){
  let data = JSON.parse(localStorage.getItem("scores")) || [];

  for(let j=0;j<data.length;j++){
    let row = data[j];
    let index = teams.indexOf(row.team);

    let val = document.getElementById("score"+index).value;

    if(!val) continue;

    let numberMatch = val.match(/\d+/);
    let manual = numberMatch ? parseInt(numberMatch[0]) : 0;

    let fullText = cleanText(val);

    let detected = 0;

    for(let k=0;k<answers.length;k++){
      let ans = cleanText(answers[k]);

      if(fullText.includes(ans)){
        detected++;
      }
    }

    row.score = Math.max(manual, detected);
  }

  localStorage.setItem("scores", JSON.stringify(data));
  loadBoard();
}

// FILTER
function filterPanel(){
  let search = document.getElementById("searchBox2").value.toLowerCase();
  let rows = document.querySelectorAll("#panel tr");

  for(let i=1;i<rows.length;i++){
    let team = rows[i].cells[0].innerText.toLowerCase();
    rows[i].style.display = team.includes(search) ? "" : "none";
  }
}

// LEADERBOARD
function loadBoard(){
  let data = JSON.parse(localStorage.getItem("scores")) || [];

  let html = "<table><tr><th>Team</th><th>Score</th><th>Time</th></tr>";

  data.sort(function(a,b){
    if((b.score||0)!==(a.score||0)){
      return (b.score||0)-(a.score||0);
    }
    return a.time - b.time;
  });

  for(let i=0;i<data.length;i++){
    html += "<tr><td>"+data[i].team+"</td><td>"+(data[i].score||"-")+"</td><td>"+formatTime(data[i].time)+"</td></tr>";
  }

  html += "</table>";

  document.getElementById("board").innerHTML = html;
}

// RESET
function resetAll(){
  localStorage.removeItem("scores");
  location.reload();
}

// INIT
window.onload = function(){
  localStorage.removeItem("scores");
  loadPanel();
};

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Event + Crossword Checker</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
  text-align:center;
  padding:20px;
}

/* 🔥 BIG TIMER */
#timer{
  font-size:120px; /* increased */
  font-weight:bold;
  margin:20px 0;
  text-shadow:0 0 15px #22c55e,0 0 35px #22c55e;
}

/* BUTTON */
button{
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:white;
  cursor:pointer;
  margin:5px;
}

/* CARD */
.container{
  max-width:750px;
  margin:auto;
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:16px;
  margin-bottom:20px;
}

/* INPUT */
input{
  padding:8px;
  border-radius:6px;
  border:none;
}

/* TEXTAREA */
textarea{
  width:90%;
  height:120px;
  border-radius:8px;
  padding:10px;
  margin:10px 0;
}

/* RESULT */
#result{text-align:left;}
.correct{color:#22c55e;}
.wrong{color:#ef4444;}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
}
td,th{
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

</style>
</head>

<body>

<h1>⚡ Event Dashboard</h1>

<button id="startBtn" onclick="startTimer()">Start Event</button>
<button onclick="resetAll()">Reset</button>

<div id="timer">0m 0s</div>

<!-- CHECKER -->
<div class="container">

<h2>🧩 Paste Answers</h2>

<input id="teamName" placeholder="Enter Team Name">

<textarea id="bulkInput" placeholder="Paste answers..."></textarea>

<br>
<button onclick="checkAll()">Check Answers</button>
<button onclick="submitScore()">Submit Score</button>

<div id="score"></div>
<div id="result"></div>

</div>

<!-- LEADERBOARD -->
<div class="container">

<h2>🏆 Leaderboard</h2>
<div id="board"></div>

</div>

<script>
// TIMER
let startTime = 0;
let timerStarted = false;

function formatTime(sec){
  let m = Math.floor(sec/60);
  let s = sec % 60;
  return m + "m " + s + "s";
}

function startTimer(){
  if(timerStarted) return;

  timerStarted = true;
  document.getElementById("startBtn").disabled = true;

  startTime = Date.now();

  setInterval(()=>{
    let t = Math.floor((Date.now()-startTime)/1000);
    document.getElementById("timer").innerText = formatTime(t);
  },1000);
}

// ANSWERS
const answers = [
  "ALGORITHM","WEB BROWSER","BACKUP",
  "FOOD DELIVERY APPS","VIDEO SHARING PLATFORMS","CLOUD COMPUTING",
  "OTT PLATFORMS","PIXEL","MESSAGING APPS","STACK",
  "SOCIAL MEDIA","RIDE SHARING","EMAIL SERVICES","URL","PASSWORD"
];

// CLEAN
function cleanText(text){
  return text.toUpperCase().replace(/\s+/g,"").trim();
}

// CHECK
let lastScore = 0;

function checkAll(){
  let input = document.getElementById("bulkInput").value;

  let words = input.split(/[\n,]+/)
                   .map(x => cleanText(x))
                   .filter(x => x !== "");

  let score = 0;
  let resultHTML = "";

  answers.forEach(ans=>{
    let cleanAns = cleanText(ans);

    if(words.includes(cleanAns)){
      resultHTML += `<div class="correct">✅ ${ans}</div>`;
      score++;
    } else {
      resultHTML += `<div class="wrong">❌ ${ans}</div>`;
    }
  });

  lastScore = score;

  document.getElementById("score").innerText =
    "🎯 Score: " + score + " / " + answers.length;

  document.getElementById("result").innerHTML = resultHTML;
}

// LEADERBOARD
let data = JSON.parse(localStorage.getItem("board")) || [];

function submitScore(){
  let name = document.getElementById("teamName").value;

  if(!name){
    alert("Enter team name");
    return;
  }

  let time = Math.floor((Date.now()-startTime)/1000);

  data.push({
    name:name,
    score:lastScore,
    time:time
  });

  localStorage.setItem("board", JSON.stringify(data));

  loadBoard();
}

function loadBoard(){
  let html = "<table><tr><th>Team</th><th>Score</th><th>Time</th></tr>";

  data.sort((a,b)=>{
    if(b.score !== a.score) return b.score - a.score;
    return a.time - b.time;
  });

  data.forEach(row=>{
    html += `<tr>
      <td>${row.name}</td>
      <td>${row.score}</td>
      <td>${formatTime(row.time)}</td>
    </tr>`;
  });

  html += "</table>";

  document.getElementById("board").innerHTML = html;
}

// RESET
function resetAll(){
  localStorage.removeItem("board");
  location.reload();
}

// INIT
window.onload = loadBoard;
</script>

</body>
</html>

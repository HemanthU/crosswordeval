<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Event Dashboard</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
  padding:20px;
}

h1{text-align:center;}

/* 🔥 BIG TIMER */
#timer{
  text-align:center;
  font-size:120px;
  font-weight:bold;
  margin:20px 0;
  text-shadow:0 0 15px #22c55e,0 0 40px #22c55e;
}

/* LAYOUT */
.container{
  display:flex;
  gap:20px;
}

.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(12px);
  padding:20px;
  border-radius:16px;
  box-shadow:0 0 20px rgba(0,0,0,0.3);
}

.left{width:55%;}
.right{width:45%;}

/* INPUTS */
textarea{
  width:100%;
  height:150px;
  border-radius:10px;
  padding:10px;
  border:none;
  outline:none;
}

input{
  width:70%;
  padding:8px;
  border-radius:8px;
  border:none;
  outline:none;
}

/* BUTTON */
button{
  padding:10px 16px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  color:white;
  margin:5px;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}

/* RESULT */
.correct{color:#22c55e;}
.wrong{color:#ef4444;}

#score{
  font-size:22px;
  margin-top:10px;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
}

td,th{
  padding:12px;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

tr:hover{
  background:rgba(255,255,255,0.08);
}

/* MOBILE */
@media(max-width:768px){
  .container{flex-direction:column;}
  .left,.right{width:100%;}
  #timer{font-size:60px;}
}
</style>
</head>

<body>

<h1>⚡ Event Dashboard</h1>

<div style="text-align:center;">
  <button id="startBtn" onclick="startTimer()">Start Event</button>
  <button onclick="resetAll()">Reset</button>
</div>

<div id="timer">0m 0s</div>

<div class="container">

<!-- LEFT PANEL -->
<div class="left card">

<h2>🧩 Answer Panel</h2>

<input id="teamName" placeholder="Enter Team Name">
<br><br>

<textarea id="bulkInput" placeholder="Paste answers OR enter score (e.g., 10)"></textarea>

<br>

<button onclick="checkAnswers()">Check</button>
<button onclick="submitScore()">Submit</button>

<div id="score"></div>
<div id="result"></div>

</div>

<!-- RIGHT PANEL -->
<div class="right card">

<h2>🏆 Leaderboard</h2>
<div id="board"></div>

</div>

</div>

<script>
// ================= TIMER =================
let startTime = 0;
let timerStarted = false;

function formatTime(sec){
  let m = Math.floor(sec/60);
  let s = sec % 60;
  return m + "m " + s + "s";
}

function startTimer(){
  if(timerStarted) return;

  timerStarted = true;
  document.getElementById("startBtn").disabled = true;

  startTime = Date.now();

  setInterval(()=>{
    let t = Math.floor((Date.now()-startTime)/1000);
    document.getElementById("timer").innerText = formatTime(t);
  },1000);
}

// ================= ANSWERS =================
const answers = [
  "ALGORITHM","WEB BROWSER","BACKUP",
  "FOOD DELIVERY APPS","VIDEO SHARING PLATFORMS","CLOUD COMPUTING",
  "OTT PLATFORMS","PIXEL","MESSAGING APPS","STACK",
  "SOCIAL MEDIA","RIDE SHARING","EMAIL SERVICES","URL","PASSWORD"
];

// CLEAN TEXT (ignore numbers, symbols, spaces)
function cleanText(text){
  return text.toUpperCase().replace(/[^A-Z]/g,"");
}

let lastScore = 0;

// ================= CHECK =================
function checkAnswers(){
  let input = document.getElementById("bulkInput").value.trim();

  // ✅ Manual score
  if(/^\d+$/.test(input)){
    lastScore = parseInt(input);

    document.getElementById("score").innerText =
      "🎯 Score: " + lastScore + " / " + answers.length;

    document.getElementById("result").innerHTML =
      "<div class='correct'>✅ Manual score used</div>";

    return;
  }

  // ✅ Auto check text
  let words = input.split(/\n|,|\./)
                   .map(x => cleanText(x))
                   .filter(x => x !== "");

  let score = 0;
  let resultHTML = "";

  answers.forEach(ans=>{
    let cleanAns = cleanText(ans);

    if(words.includes(cleanAns)){
      resultHTML += `<div class="correct">✅ ${ans}</div>`;
      score++;
    } else {
      resultHTML += `<div class="wrong">❌ ${ans}</div>`;
    }
  });

  lastScore = score;

  document.getElementById("score").innerText =
    "🎯 Score: " + score + " / " + answers.length;

  document.getElementById("result").innerHTML = resultHTML;
}

// ================= LEADERBOARD =================
let data = JSON.parse(localStorage.getItem("board")) || [];

function submitScore(){
  let name = document.getElementById("teamName").value;

  if(!name){
    alert("Enter team name");
    return;
  }

  let time = Math.floor((Date.now()-startTime)/1000);

  data.push({ name, score:lastScore, time });

  localStorage.setItem("board", JSON.stringify(data));
  loadBoard();
}

function loadBoard(){
  let html = "<table><tr><th>Rank</th><th>Team</th><th>Score</th><th>Time</th></tr>";

  data.sort((a,b)=>{
    if(b.score !== a.score) return b.score - a.score;
    return a.time - b.time;
  });

  data.forEach((row,i)=>{
    let medal = i==0?"🥇":i==1?"🥈":i==2?"🥉":(i+1);

    html += `<tr>
      <td>${medal}</td>
      <td>${row.name}</td>
      <td>${row.score}</td>
      <td>${formatTime(row.time)}</td>
    </tr>`;
  });

  html += "</table>";
  document.getElementById("board").innerHTML = html;
}

// ================= RESET =================
function resetAll(){
  localStorage.removeItem("board");
  location.reload();
}

window.onload = loadBoard;
</script>

</body>
</html>

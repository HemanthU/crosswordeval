<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Event Dashboard</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
  padding:20px;
}

h1{text-align:center;}

/* 🔥 INCREASED TIMER SIZE */
#timer{
  text-align:center;
  font-size:120px; /* increased */
  font-weight:bold;
  margin:20px 0;
  text-shadow:0 0 15px #22c55e,0 0 35px #22c55e;
}

.container{display:flex;gap:20px;}

.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  padding:20px;
  border-radius:16px;
}

.left{width:55%;}
.right{width:45%;}

table{width:100%;border-collapse:collapse;}
td,th{padding:12px;border-bottom:1px solid rgba(255,255,255,0.1);}

/* ❗ INPUT NOW ACCEPTS TEXT ALSO */
input{
  width:80px;
  padding:6px;
  border-radius:6px;
  border:none;
  text-align:center;
}

.search{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:none;
  margin-bottom:10px;
}

button{
  padding:8px 14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  color:white;
  background:linear-gradient(135deg,#22c55e,#16a34a);
}

tr:hover{background:rgba(255,255,255,0.08);}

@media(max-width:768px){
  .container{flex-direction:column;}
  .left,.right{width:100%;}
  #timer{font-size:60px;}
}
</style>
</head>

<body>

<h1>⚡ Event Dashboard</h1>

<div style="text-align:center;">
  <button id="startBtn" onclick="startTimer()">Start Event</button>
  <button onclick="resetAll()">Reset</button>
</div>

<h2 id="timer">0m 0s</h2>

<div class="container">

<div class="left card">
  <h2>🎯 Team Panel</h2>

  <input id="searchBox2" class="search" placeholder="🔍 Search team..." onkeyup="filterPanel()">

  <table id="panel">
    <tr>
      <th>Team</th>
      <th>Score</th>
      <th>Action</th>
      <th>Time</th>
    </tr>
  </table>

  <br>
  <button onclick="updateScores()">Update Scores</button>
</div>

<div class="right card">
  <h2>🏆 Leaderboard</h2>

  <input id="searchBox" class="search" placeholder="🔍 Search team..." onkeyup="syncSearch()">
  <button onclick="exportData()">Export</button>

  <br><br>
  <div id="board"></div>
</div>

</div>

<script>
const teams = [
  "Team 1","Team 2","Team 3","Team 4","Team 5",
  "Team 6","Team 7","Team 8","Team 9","Team 10"
];

let startTime = 0;
let timerStarted = false;
let data = [];

/* 🔥 ANSWERS FOR AUTO CHECK */
const answers = [
  "ALGORITHM","WEB BROWSER","BACKUP",
  "FOOD DELIVERY APPS","VIDEO SHARING PLATFORMS","CLOUD COMPUTING",
  "OTT PLATFORMS","PIXEL","MESSAGING APPS","STACK",
  "SOCIAL MEDIA","RIDE SHARING","EMAIL SERVICES","URL","PASSWORD"
];

function cleanText(text){
  return text.toUpperCase().replace(/[^A-Z]/g,"");
}

// TIMER
function formatTime(sec){
  let m = Math.floor(sec/60);
  let s = sec % 60;
  return m + "m " + s + "s";
}

function startTimer(){
  if(timerStarted){
    alert("Timer already started!");
    return;
  }
  timerStarted = true;
  document.getElementById("startBtn").disabled = true;

  startTime = Date.now();

  setInterval(()=>{
    let t = Math.floor((Date.now()-startTime)/1000);
    document.getElementById("timer").innerText = formatTime(t);
  },1000);
}

// PANEL
function loadPanel(){
  let table = document.getElementById("panel");

  teams.forEach((team,i)=>{
    let row = table.insertRow();

    row.innerHTML = `
      <td>${team}</td>
      <td><input id="score${i}"></td>
      <td><button id="btn${i}" onclick="finishTeam(${i})">Finish</button></td>
      <td id="time${i}">-</td>
    `;
  });
}

// FINISH
function finishTeam(i){
  let time = Math.floor((Date.now()-startTime)/1000);

  document.getElementById("time"+i).innerText = formatTime(time);
  document.getElementById("btn"+i).disabled = true;

  data.push({
    team: teams[i],
    time: time,
    score: null
  });

  localStorage.setItem("scores", JSON.stringify(data));
  loadBoard();
}

// 🔥 SMART SCORE UPDATE
function updateScores(){
  let data = JSON.parse(localStorage.getItem("scores")) || [];

  data.forEach(row=>{
    let index = teams.indexOf(row.team);
    let val = document.getElementById("score"+index)?.value.trim();

    if(!val) return;

    // ✅ NUMBER
    if(/^\d+$/.test(val)){
      row.score = parseInt(val);
      return;
    }

    // ✅ TEXT (AUTO CHECK)
    let words = val.split(/\n|,|\./)
                   .map(x => cleanText(x))
                   .filter(x => x !== "");

    let score = 0;

    answers.forEach(ans=>{
      if(words.includes(cleanText(ans))){
        score++;
      }
    });

    row.score = score;
  });

  localStorage.setItem("scores", JSON.stringify(data));
  loadBoard();
}

// FILTER
function filterPanel(){
  let search = document.getElementById("searchBox2").value.toLowerCase();
  document.getElementById("searchBox").value = search;

  let rows = document.querySelectorAll("#panel tr");

  rows.forEach((row,i)=>{
    if(i===0) return;
    let team = row.cells[0].innerText.toLowerCase();
    row.style.display = team.includes(search) ? "" : "none";
  });

  loadBoard();
}

function syncSearch(){
  let val = document.getElementById("searchBox").value;
  document.getElementById("searchBox2").value = val;
  loadBoard();
}

// BOARD
function loadBoard(){
  let data = JSON.parse(localStorage.getItem("scores")) || [];
  let search = document.getElementById("searchBox")?.value.toLowerCase() || "";

  let html = "<table><tr><th>Team</th><th>Score</th><th>Time</th></tr>";

  let hasScores = data.some(d=>d.score!==null);

  data.sort((a,b)=>{
    if(hasScores){
      if((b.score||0)!==(a.score||0)){
        return (b.score||0)-(a.score||0);
      }
      return a.time - b.time;
    } else {
      return a.time - b.time;
    }
  });

  data.forEach(row=>{
    if(row.team.toLowerCase().includes(search)){
      html += `<tr>
        <td>${row.team}</td>
        <td>${row.score ?? "-"}</td>
        <td>${formatTime(row.time)}</td>
      </tr>`;
    }
  });

  html += "</table>";
  document.getElementById("board").innerHTML = html;
}

// EXPORT
function exportData(){
  let data = JSON.parse(localStorage.getItem("scores")) || [];

  let csv = "Team,Score,Time\n";

  data.forEach(row=>{
    csv += `${row.team},${row.score ?? ""},${formatTime(row.time)}\n`;
  });

  let blob = new Blob([csv], {type:"text/csv"});
  let link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "leaderboard.csv";
  link.click();
}

// RESET
function resetAll(){
  localStorage.removeItem("scores");
  location.reload();
}

// INIT
window.onload = function(){
  localStorage.removeItem("scores");
  loadPanel();
  loadBoard();
};
</script>

</body>
</html>
